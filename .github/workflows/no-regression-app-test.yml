name: No Regression App Test

# CSV-mapped battery (52 tests, one per row of the manual QA spreadsheet H-01..H-46) —
# hits the real backend/DB, no page.route() mocking. See e2e/README.md.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  e2e:
    runs-on: ubuntu-latest
    # 52 real tests, serial (workers: 1) against the real Railway environment — ~30s
    # each observed in practice, so 20 was too tight and got cancelled mid-run before
    # any report could be written. Generous margin here on purpose.
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: e2e/package-lock.json

      - name: Install e2e dependencies
        run: cd e2e && npm install

      - name: Install Playwright browsers
        run: cd e2e && npx playwright install chromium --with-deps

      # RAILWAY_BACKEND_URL has a trailing slash (copied from Railway's own env var
      # config). Several test files build request URLs via raw string concatenation
      # (`${API_BASE_URL}/rooms`), which a trailing slash turns into a double slash —
      # Express's route matching doesn't collapse that, so the request 404s and the
      # response body is the default HTML error page instead of JSON. Strip it once
      # here so every call site gets a clean base, regardless of how the secret is set.
      - name: Normalize API_BASE_URL
        run: echo "API_BASE_URL=$(echo '${{ secrets.RAILWAY_BACKEND_URL }}' | sed 's:/*$::')" >> "$GITHUB_ENV"

      - name: Run no-regression app tests
        env:
          BASE_URL: ${{ secrets.RAILWAY_FRONTEND_URL }}
          DEV_LOGIN_USER: ${{ secrets.DEV_LOGIN_USER }}
          DEV_LOGIN_PASS: ${{ secrets.DEV_LOGIN_PASS }}
          # Fixed backend/src/routes/auth.routes.ts DEV_ACCOUNTS entry — same shared
          # DEV_LOGIN_PASS, not a separate secret.
          DEV_LOGIN_EMPLOYEE_USER: mario.rossi@dblue.it
          DEV_LOGIN_EMPLOYEE_PASS: ${{ secrets.DEV_LOGIN_PASS }}
        run: cd e2e && npm run test:csv

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-no-regression
          path: e2e/playwright-report/
          retention-days: 7

      # Commits the Markdown run summary (e2e/reports/, generated by
      # e2e/reporters/csv-summary-reporter.ts) back to the repo, so results stay
      # readable in git history rather than only as a 7-day CI artifact. Runs even
      # when tests failed — that's the most useful case to have a summary for, since
      # several CSV rows are expected to fail until the underlying bugs are fixed.
      # Pushes made with the default GITHUB_TOKEN do not re-trigger other workflow
      # runs, so this cannot create a push-triggered loop.
      #
      # Two-phase commit to avoid the reports/README.md merge conflict seen when this
      # workflow and Basic App Test commit close together in time: the new report file
      # (unique timestamped name, never conflicts) is committed first, then the index
      # is regenerated from scratch (stateless — see scripts/regenerate-reports-index.js)
      # and committed separately after a rebase. A few retries cover the rare case where
      # another run pushes in the window between our rebase and our push; if all retries
      # are exhausted this step only warns, since the report is a nice-to-have and must
      # not fail an otherwise-successful test run.
      - name: Commit test summary report
        if: always()
        # Deliberately stays at repo root for the whole step (no `cd e2e`): `git
        # status --porcelain` always returns paths relative to the repo root
        # regardless of cwd, so `cd e2e` here previously made `git add` resolve
        # that root-relative path against cwd=e2e/ too, doubling the prefix to
        # e2e/e2e/reports/... and failing with "did not match any files".
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          NEW_REPORT=$(git status --porcelain e2e/reports/ | grep '^??' | awk '{print $2}' | grep -v 'README.md' || true)
          if [ -z "$NEW_REPORT" ]; then
            echo "No new report file to commit."
            exit 0
          fi

          git add "$NEW_REPORT"
          git commit -m "test: No Regression App Test run summary $(date -u +%Y-%m-%dT%H:%M:%SZ)"

          # The reporter already overwrote e2e/reports/README.md on disk this run
          # (stale, computed before any rebase); discard that uncommitted change so
          # the working tree is clean for `git pull --rebase` — it gets regenerated
          # fresh below.
          git checkout -- e2e/reports/README.md 2>/dev/null || true

          MAX_ATTEMPTS=5
          ATTEMPT=1
          PUSHED=false
          while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
            if git pull --rebase origin "${{ github.ref_name }}"; then
              node e2e/scripts/regenerate-reports-index.js e2e/reports
              git add e2e/reports/README.md
              if ! git diff --cached --quiet; then
                git commit -m "test: regenerate reports index"
              fi
              if git push origin HEAD:"${{ github.ref_name }}"; then
                PUSHED=true
                break
              fi
            else
              git rebase --abort || true
            fi
            SLEEP=$((ATTEMPT * 3))
            echo "Push attempt $ATTEMPT failed, retrying in ${SLEEP}s..."
            sleep "$SLEEP"
            ATTEMPT=$((ATTEMPT + 1))
          done

          if [ "$PUSHED" != "true" ]; then
            echo "::warning::Could not push the e2e run summary report after $MAX_ATTEMPTS attempts (non-fatal, test results above are still valid)."
          fi
