name: Basic App Test

# Pre-existing regression / smoke suite (11 spec files, predates the CSV-mapped
# battery below) — mostly page.route()-mocked tests targeted at specific historic
# bugs/PRs. See e2e/README.md.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  e2e:
    runs-on: ubuntu-latest
    # Bumped from 20: the shared no-regression-app-test.yml value was cut too tight
    # for a real (non-mocked) run against Railway and got cancelled mid-suite before
    # any report could be written — same risk applies here, kept some headroom.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: e2e/package-lock.json

      - name: Install e2e dependencies
        run: cd e2e && npm install

      - name: Install Playwright browsers
        run: cd e2e && npx playwright install chromium --with-deps

      - name: Run basic app tests
        env:
          BASE_URL: ${{ secrets.RAILWAY_FRONTEND_URL }}
          API_BASE_URL: ${{ secrets.RAILWAY_BACKEND_URL }}
          DEV_LOGIN_USER: ${{ secrets.DEV_LOGIN_USER }}
          DEV_LOGIN_PASS: ${{ secrets.DEV_LOGIN_PASS }}
          # Fixed backend/src/routes/auth.routes.ts DEV_ACCOUNTS entry — same shared
          # DEV_LOGIN_PASS, not a separate secret.
          DEV_LOGIN_EMPLOYEE_USER: mario.rossi@dblue.it
          DEV_LOGIN_EMPLOYEE_PASS: ${{ secrets.DEV_LOGIN_PASS }}
        run: cd e2e && npm run test:basic

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-basic
          path: e2e/playwright-report/
          retention-days: 7

      # Commits the Markdown run summary (e2e/reports/, generated by
      # e2e/reporters/csv-summary-reporter.ts) back to the repo, so results stay
      # readable in git history rather than only as a 7-day CI artifact. Runs even
      # when tests failed — that's the most useful case to have a summary for.
      # Pushes made with the default GITHUB_TOKEN do not re-trigger other workflow
      # runs, so this cannot create a push-triggered loop.
      - name: Commit test summary report
        if: always()
        run: |
          cd e2e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/
          if git diff --cached --quiet; then
            echo "No report changes to commit."
          else
            git commit -m "test: Basic App Test run summary $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git pull --rebase origin "${{ github.ref_name }}"
            git push origin HEAD:"${{ github.ref_name }}"
          fi
