name: E2E Tests

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: e2e/package-lock.json

      - name: Install e2e dependencies
        run: cd e2e && npm install

      - name: Install Playwright browsers
        run: cd e2e && npx playwright install chromium --with-deps

      - name: Run E2E tests
        env:
          BASE_URL: ${{ secrets.RAILWAY_FRONTEND_URL }}
          API_BASE_URL: ${{ secrets.RAILWAY_BACKEND_URL }}
          DEV_LOGIN_USER: ${{ secrets.DEV_LOGIN_USER }}
          DEV_LOGIN_PASS: ${{ secrets.DEV_LOGIN_PASS }}
        run: cd e2e && npx playwright test

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7
